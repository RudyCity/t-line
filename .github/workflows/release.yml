name: Build and Release Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python (for node-pty native build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y build-essential libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: xcode-select --install || true

      - name: Install Dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w node-pty --module-dir desktop
        env:
          npm_config_msvs_version: '2022'

      - name: Build Frontend
        run: npm run build:frontend

      - name: Build Backend
        run: npm run build:backend

      - name: Build Desktop (Package)
        run: npm run build:desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            desktop/dist-exe/*.exe
            desktop/dist-exe/*.dmg
            desktop/dist-exe/*.zip
            desktop/dist-exe/*.AppImage
            desktop/dist-exe/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
